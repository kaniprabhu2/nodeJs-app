apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodejs-dev
  labels:
    app: nodejs
    env: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nodejs
      env: dev
  template:
    metadata:
      labels:
        app: nodejs
        env: dev
    spec:
      containers:
        - name: nodejs
          image: kaniprabhu02/nodejs-app:v1
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: PORT
              value: "5000"

          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
