apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodejs-blue
  labels:
    app: nodejs
    version: blue
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nodejs
      version: blue
  template:
    metadata:
      labels:
        app: nodejs
        version: blue
    spec:
      containers:
        - name: nodejs
          image: kaniprabhu02/nodejs-app:v1
          ports:
            - containerPort: 5000
          env:
            - name: PORT
              value: "5000"

          livenessProbe:
            httpGet:
              path: /health
              port: 5000

          readinessProbe:
            httpGet:
              path: /health
              port: 5000
